# PostgreSQL 主库访问控制配置
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# "local" is for Unix domain socket connections only
local   all             all                                     trust

# IPv4 local connections:
host    all             all             127.0.0.1/32            scram-sha-256

# IPv4 connections from Docker network
host    all             all             172.20.0.0/16           scram-sha-256

# 允许所有IP连接 (开发环境)
# 生产环境应该限制为特定IP段
host    all             all             0.0.0.0/0               scram-sha-256

# IPv6 local connections:
host    all             all             ::1/128                 scram-sha-256

# 复制连接配置
# 允许replicator用户从从库进行流复制
host    replication     replicator      172.20.0.11/32          scram-sha-256
host    replication     replicator      172.20.0.12/32          scram-sha-256
host    replication     replicator      172.20.0.0/16           scram-sha-256

# 允许所有主机的复制连接 (开发环境)
# 生产环境应该限制
host    replication     replicator      0.0.0.0/0               scram-sha-256
