# PostgreSQL Master 配置文件
# 适用于主从复制架构中的主库

# ============ 连接配置 ============
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# ============ 内存配置 ============
shared_buffers = 256MB          # 推荐为系统内存的25%
effective_cache_size = 1GB      # 推荐为系统内存的50%-75%
maintenance_work_mem = 64MB
work_mem = 16MB

# ============ WAL 配置 (主从复制关键) ============
wal_level = replica             # 启用复制级别WAL
max_wal_senders = 10            # 最大WAL发送进程数
max_replication_slots = 10      # 最大复制槽数
wal_keep_size = 1GB             # 保留的WAL文件大小
wal_log_hints = on              # 启用WAL提示日志

# WAL写入配置
fsync = on
synchronous_commit = on
wal_sync_method = fdatasync
full_page_writes = on
wal_compression = on

# WAL归档配置
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/archive/%f && cp %p /var/lib/postgresql/archive/%f'

# ============ 查询优化 ============
random_page_cost = 1.1          # SSD优化
effective_io_concurrency = 200  # SSD并发IO
default_statistics_target = 100

# ============ 日志配置 ============
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_lock_waits = on
log_statement = 'ddl'           # 记录DDL语句
log_temp_files = 0
log_autovacuum_min_duration = 0

# 慢查询日志
log_min_duration_statement = 100  # 记录超过100ms的查询

# ============ 自动清理配置 ============
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_scale_factor = 0.01
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200

# ============ 连接池配置 ============
# 配合应用层连接池使用
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# ============ 安全配置 ============
password_encryption = scram-sha-256
ssl = off                       # 生产环境建议开启

# ============ 性能监控 ============
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
track_io_timing = on
track_functions = all
track_activity_query_size = 2048

# ============ 其他配置 ============
timezone = 'Asia/Shanghai'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
