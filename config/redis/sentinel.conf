# Redis Sentinel 配置文件
# 用于Redis主从自动故障转移

# ============ 网络配置 ============
bind 0.0.0.0
port 26379
protected-mode no

# ============ Sentinel 配置 ============
# Monitor master
# sentinel monitor <master-name> <ip> <port> <quorum>
# quorum: number of sentinels that need to agree master is down
sentinel monitor quantmind-master 172.20.0.20 6379 2

# masterauth (if password is set)
# sentinel auth-pass quantmind-master your_secure_password_here

# ============ 故障检测配置 ============
# Master down after no response (milliseconds)
sentinel down-after-milliseconds quantmind-master 5000

# Failover timeout (milliseconds)
sentinel failover-timeout quantmind-master 60000

# ============ 通知脚本 ============
# 主库切换时执行的脚本
# sentinel notification-script quantmind-master /path/to/notify.sh

# 客户端重新配置脚本
# sentinel client-reconfig-script quantmind-master /path/to/reconfig.sh

# ============ 并行同步 ============
# Number of slaves sync at the same time during failover
sentinel parallel-syncs quantmind-master 1

# ============ 日志配置 ============
loglevel notice
logfile ""

# ============ 运行模式 ============
# Sentinel将在运行时修改此文件，添加动态配置
# 因此需要写权限
daemonize no
pidfile /var/run/redis-sentinel.pid
dir /tmp

# ============ 其他配置 ============
# Sentinel ID会在首次运行时自动生成
# sentinel myid <id>

# Sentinel之间的通信配置
# sentinel known-replica quantmind-master <ip> <port>
# sentinel known-sentinel quantmind-master <ip> <port> <runid>
