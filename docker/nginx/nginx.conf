# QuantMind OSS Edition - Nginx Gateway
# 本地部署版本，移除云域名和SSL配置

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'upstream: $upstream_addr rt: $upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=trade_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=engine_limit:10m rate=20r/s;

    # ================================================================
    # 上游服务集群
    # ================================================================

    upstream api_server {
        server quantmind-api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream trade_core {
        server quantmind-trade:8002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream engine_compute {
        server quantmind-engine:8001 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    upstream stream_gateway {
        server quantmind-stream:8003 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    proxy_cache_path /var/cache/nginx/api
                     levels=1:2
                     keys_zone=api_cache:10m
                     max_size=200m
                     inactive=10m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ================================================================
    # HTTP Server (Port 80) - OSS Edition
    # ================================================================
    server {
        listen 80;
        server_name localhost;

        include /etc/nginx/cors.conf;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        set $api_upstream http://quantmind-api:8000;
        set $trade_upstream http://quantmind-trade:8002;
        set $engine_upstream http://quantmind-engine:8001;
        set $stream_upstream http://quantmind-stream:8003;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        location /health {
            access_log off;
            return 200 '{"status":"ok","gateway":"nginx","edition":"oss"}\n';
        }

        location / {
            include /etc/nginx/cors.conf;

            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Expose-Headers';

            location /auth/ {
                rewrite ^/auth/(.*) /api/v1/auth/$1 break;
                proxy_pass $api_upstream;
            }

            location /api/v1/orders {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $trade_upstream;
            }

            location /api/v1/trades {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $trade_upstream;
            }

            location /api/v1/portfolios {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $trade_upstream;
            }

            location /api/v1/simulation {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $trade_upstream;
            }

            location /api/v1/real-trading {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $trade_upstream;
            }

            location /api/v1/qlib {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $api_upstream;
            }

            location /api/v1/backtest {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $api_upstream;
            }

            location /api/v1/strategies {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $api_upstream;
            }

            location /api/v1/internal/strategy {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $trade_upstream;
            }

            location /api/stocks {
                rewrite ^/api/stocks(.*)$ /api/v1/stocks$1 break;
                proxy_pass $api_upstream;
            }

            location /api/v1/ws/ {
                proxy_pass $stream_upstream;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;
            }

            location /api/v1/ai-ide/ai/chat {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $api_upstream;
                proxy_buffering off;
                proxy_cache off;
                proxy_set_header X-Accel-Buffering no;
                chunked_transfer_encoding on;
            }

            location /api/v1/ai-ide/execute/logs/ {
                include /etc/nginx/cors.conf;
                proxy_hide_header 'Access-Control-Allow-Origin';
                proxy_hide_header 'Access-Control-Allow-Methods';
                proxy_hide_header 'Access-Control-Allow-Headers';
                proxy_hide_header 'Access-Control-Allow-Credentials';
                proxy_hide_header 'Access-Control-Expose-Headers';
                proxy_pass $api_upstream;
                proxy_buffering off;
                proxy_cache off;
                proxy_set_header X-Accel-Buffering no;
                chunked_transfer_encoding on;
            }

            location /api/v1/ {
                proxy_pass $api_upstream;
            }

            location /ws {
                proxy_pass $stream_upstream;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
            }

            location /uploads {
                proxy_pass $api_upstream;
            }

            return 404 '{"error":"route not found"}\n';
        }

        location /metrics {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}
